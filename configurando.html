<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Date Bot — Configurando seu Date Bot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #000;
      color: #fff;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ===== BARRA VERMELHA DO TOPO ===== */
    .top-warning {
      width: 100%;
      background: rgba(239, 68, 68, 0.15);
      border: 1.2px solid rgba(239, 68, 68, 0.4);
      border-radius: 12px;
      padding: 12px 16px;
      text-align: center;
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      margin: 10px auto;
      max-width: 95%;
      animation: pulse-red 2s ease-in-out infinite;
    }

    @keyframes pulse-red {
      0%, 100% { border-color: rgba(239, 68, 68, 0.4); background: rgba(239, 68, 68, 0.15); }
      50% { border-color: rgba(239, 68, 68, 0.8); background: rgba(239, 68, 68, 0.25); }
    }

    /* ===== ÁREA PRINCIPAL ===== */
    .main-container {
      width: 100%;
      max-width: 520px;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px 16px 40px;
      gap: 14px;
    }

    /* ===== BARRA DE PROGRESSO ===== */
    .config-label {
      font-size: 13px;
      color: #ccc;
      text-align: center;
      margin-bottom: 4px;
      width: 100%;
    }

    .progress-wrapper {
      width: 100%;
    }

    .progress-track {
      width: 100%;
      height: 11px;
      background: #1a1a1a;
      border-radius: 99px;
      overflow: hidden;
      margin-bottom: 6px;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: #895af6;
      border-radius: 99px;
      transition: width 0.4s ease;
    }

    .progress-pct {
      text-align: center;
      font-size: 15px;
      font-weight: 600;
      color: #895af6;
    }

    /* ===== PLAYER DE VÍDEO ===== */
    .video-wrapper {
      width: 100%;
      max-width: 400px;
      position: relative;
    }

    .video-placeholder {
      width: 100%;
      aspect-ratio: 9/16;
      background: #111;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      color: #555;
      font-size: 14px;
      text-align: center;
      padding: 24px;
      border: 1px dashed #333;
    }

    .video-placeholder .play-icon {
      font-size: 48px;
      color: #895af6;
    }

    /* ===== BOTÃO CTA (aparece após progresso = 100%) ===== */
    .cta-section {
      width: 100%;
      max-width: 400px;
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      animation: fadeUp 0.6s ease;
    }

    .cta-section.visible {
      display: flex;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .btn-cta {
      width: 100%;
      background: rgb(139, 92, 246);
      color: #fff;
      font-size: 18px;
      font-weight: 700;
      padding: 16px 24px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      text-decoration: none;
      display: block;
      text-align: center;
      box-shadow: 0 4px 24px rgba(139, 92, 246, 0.5);
      transition: opacity 0.2s, transform 0.1s;
      letter-spacing: 0.5px;
    }

    .btn-cta:hover {
      opacity: 0.9;
      transform: translateY(-2px);
    }

    .cta-note {
      font-size: 11px;
      color: #888;
      text-align: center;
    }

    /* ===== CONFETE ANIMADO ===== */
    .confetti-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 9999;
      display: none;
    }

    .confetti-container.active {
      display: block;
    }

    .confetti-piece {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 2px;
      animation: confetti-fall linear forwards;
    }

    @keyframes confetti-fall {
      0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }
  </style>
</head>
<body>

  <!-- BARRA VERMELHA TOPO -->
  <div class="top-warning">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2" style="vertical-align:middle;margin-right:6px;"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
    Não feche esta janela. Configuração em andamento.
  </div>

  <!-- ÁREA PRINCIPAL -->
  <div class="main-container">

    <!-- PROGRESSO -->
    <div class="progress-wrapper">
      <div class="config-label" id="configLabel">Configurando seu robô personalizado...</div>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="progress-pct" id="progressPct">0%</div>
    </div>

    <!-- VÍDEO -->
    <div class="video-wrapper">

      <!--
        =====================================================================
        COLE AQUI O SEU CÓDIGO DE EMBED DO VÍDEO (Vturb, YouTube, etc.)

        Exemplo com YouTube (vídeo vertical):
        <iframe
          width="100%"
          style="aspect-ratio:9/16; border-radius:12px;"
          src="https://www.youtube.com/embed/SEU_VIDEO_ID?autoplay=1"
          frameborder="0"
          allow="autoplay; fullscreen"
          allowfullscreen>
        </iframe>

        Exemplo com Vturb/Smartplayer (cole o código que eles fornecem):
        <div id="vid-XXXXXX"></div>
        <script src="https://scripts.converteai.net/..."></script>
        =====================================================================
      -->

      <script src="https://fast.wistia.com/player.js" async></script><script src="https://fast.wistia.com/embed/gfzebt94vx.js" async type="module"></script><style>wistia-player[media-id='gfzebt94vx']:not(:defined) { background: center / contain no-repeat url('https://fast.wistia.com/embed/medias/gfzebt94vx/swatch'); display: block; filter: blur(5px); padding-top:133.33%; }</style>
      <wistia-player media-id="gfzebt94vx" aspect="0.75" style="border-radius:12px;overflow:hidden;width:100%;"></wistia-player>

    </div>

    <!-- BOTÃO CTA — aparece quando progresso chega em 100% -->
    <div class="cta-section" id="ctaSection">
      <a href="https://ggcheckout.app/checkout/v5/sgCVSCELYpkVfCz62fTW" class="btn-cta">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="vertical-align:middle;margin-right:8px;"><rect x="3" y="11" width="18" height="10" rx="2"/><path d="M12 11V7"/><circle cx="12" cy="5" r="2"/><path d="M8 15h.01M16 15h.01"/></svg>
        Quero Acessar o Date Bot Pro
      </a>
      <p class="cta-note">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="#fbbf24" style="vertical-align:middle;margin-right:4px;"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
        Acesso liberado exclusivamente para quem completou o teste
      </p>
    </div>

  </div>

  <!-- CONFETE (aparece ao chegar 100%) -->
  <div class="confetti-container" id="confetti"></div>

  <script>
    const DURACAO_MS = 4 * 60 * 1000; // 4 minutos

    let ctaShown = false;
    let startTime = Date.now();

    let progressInterval = setInterval(function() {
      const elapsed = Date.now() - startTime;
      const pct = Math.min(100, Math.floor((elapsed / DURACAO_MS) * 100));

      document.getElementById('progressFill').style.width = pct + '%';
      document.getElementById('progressPct').textContent = pct + '%';

      if (pct >= 90) {
        document.getElementById('configLabel').textContent = 'Quase pronto! Finalizando configuração...';
      } else if (pct >= 50) {
        document.getElementById('configLabel').textContent = 'Personalizando sua estratégia...';
      } else {
        document.getElementById('configLabel').textContent = 'Configurando seu robô personalizado...';
      }

      if (pct >= 100) {
        clearInterval(progressInterval);
        document.getElementById('configLabel').innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" style="vertical-align:middle;margin-right:5px;"><polyline points="20 6 9 17 4 12"/></svg> Robô configurado com sucesso!';
        if (!ctaShown) {
          ctaShown = true;
          document.getElementById('ctaSection').classList.add('visible');
          launchConfetti();
        }
      }
    }, 500);

    // ===== CONFETE =====
    function launchConfetti() {
      const container = document.getElementById('confetti');
      container.classList.add('active');
      const colors = ['#895af6', '#c084fc', '#fff', '#f59e0b', '#10b981'];
      for (let i = 0; i < 80; i++) {
        const piece = document.createElement('div');
        piece.className = 'confetti-piece';
        piece.style.left = Math.random() * 100 + 'vw';
        piece.style.top = '-10px';
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.animationDuration = (1.5 + Math.random() * 2) + 's';
        piece.style.animationDelay = (Math.random() * 1) + 's';
        container.appendChild(piece);
      }
      setTimeout(() => container.classList.remove('active'), 4000);
    }
  </script>
</body>
</html>
